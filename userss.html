<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
display:flex;
background:#020617;
color:#fff;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
width:250px;
height:100vh;
background:#0f172a;
padding:20px;
position:fixed;
display:flex;
flex-direction:column;
}

/* LOGO */
.logo img{
width:140px;
margin-bottom:20px;
}

/* MENU */
.menu{
flex:1;
}

.sidebar a{
display:block;
padding:12px;
margin:6px 0;
color:#aaa;
text-decoration:none;
border-radius:8px;
}

.sidebar a.active{
background:#1e293b;
color:#fff;
}

/* BACK BUTTON (FIXED POSITION) */
.back-btn{
margin-top:10px;
background:#ef4444;
color:#fff;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.back-btn:hover{
background:#dc2626;
}

/* MAIN */
.main{
margin-left:250px;
width:100%;
padding:15px;
}

/* TOPBAR */
.topbar{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
}

/* HAMBURGER */
.hamburger{
width:42px;
height:42px;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
background:#0f172a;
border-radius:12px;
border:1px solid #1e293b;
}

.hamburger span{
width:22px;
height:3px;
background:#fff;
margin:3px 0;
}

/* CARDS */
.top-cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:15px;
}

.info-card{
background:#0f172a;
padding:15px;
border-radius:12px;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
}

/* CARD */
.card{
background:#0f172a;
padding:15px;
border-radius:12px;
height:320px;
overflow:hidden; /* 🔥 FIX overflow */
}

/* CHART FIX */
.chart-container{
width:100%;
height:100%;
position:relative;
}

canvas{
width:100% !important;
height:100% !important;
}

/* MAP */
#map{
width:100%;
height:100%;
border-radius:12px;
}

/* MOBILE */
@media(max-width:768px){

.hamburger{display:flex;}

/* SIDEBAR FIX */
.sidebar{
left:-100%;
transition:0.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

/* MAIN */
.main{
margin-left:0;
}

/* GRID */
.grid{
grid-template-columns:1fr;
}

.top-cards{
grid-template-columns:1fr 1fr;
}

/* CARD HEIGHT FIX */
.card{
height:auto;
}

/* CHART HEIGHT FIX */
.chart-container{
height:250px;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="logo">
<img src="logo.webp">
</div>

<div class="menu">
<a href="userdashboard.html">Dashboard</a>
<a href="userss.html" class="active">Users</a>
<a href="loginss.html">Logins</a>
<a href="devicess.html">Devices</a>
<a href="sessionss.html">Sessions</a>
<a href="settingss.html">Settings</a>

<!-- 🔥 BACK BUTTON BELOW SETTINGS -->
<div class="back-btn" onclick="location.href='login.html'">
← Back
</div>

</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="hamburger" onclick="toggleSidebar()">
<span></span><span></span><span></span>
</div>
<h3>Users</h3>
</div>

<!-- CARDS -->
<div class="top-cards">
<div class="info-card"><h2>4823</h2><p>Total Users</p></div>
<div class="info-card"><h2>312</h2><p>New Users</p></div>
<div class="info-card"><h2>87%</h2><p>Active Rate</p></div>
<div class="info-card"><h2>245</h2><p>Premium Users</p></div>
</div>

<div class="grid">

<!-- USER GROWTH -->
<div class="card">
<h4>User Growth</h4>
<div class="chart-container">
<canvas id="userChart"></canvas>
</div>
</div>

<!-- MAP -->
<div class="card">
<h4>User Locations</h4>
<div id="map"></div>
</div>

<!-- STATUS -->
<div class="card">
<h4>User Status</h4>
<div class="chart-container">
<canvas id="statusChart"></canvas>
</div>
</div>

</div>

</div>

<script>

/* HAMBURGER FIX (OPEN + CLOSE PROPERLY) */
const sidebar = document.getElementById("sidebar");

function toggleSidebar(){
sidebar.classList.toggle("active");
}

/* 🔥 CLOSE WHEN CLICK OUTSIDE */
document.addEventListener("click", function(e){
if(
sidebar.classList.contains("active") &&
!sidebar.contains(e.target) &&
!e.target.closest(".hamburger")
){
sidebar.classList.remove("active");
}
});


/* USER CHART */
new Chart(document.getElementById("userChart"),{
type:'line',
data:{
labels:["Jan","Feb","Mar","Apr","May","Jun"],
datasets:[
{
label:"Users",
data:[200,400,350,600,800,950],
borderColor:"#22c55e",
tension:.4
},
{
label:"New Users",
data:[100,200,180,300,400,500],
borderColor:"#3b82f6",
tension:.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

/* STATUS CHART */
new Chart(document.getElementById("statusChart"),{
type:'doughnut',
data:{
labels:["Active","Inactive"],
datasets:[{
data:[80,20],
backgroundColor:["#22c55e","#ef4444"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

/* MAP */
var map = L.map('map',{zoomControl:false}).setView([20,0],2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

L.circleMarker([13.08,80.27],{radius:8,color:"#22c55e"})
.addTo(map).bindPopup("Chennai Users");

L.circleMarker([28.6,77.2],{radius:8,color:"#3b82f6"})
.addTo(map).bindPopup("Delhi Users");

</script>

</body>
</html>
