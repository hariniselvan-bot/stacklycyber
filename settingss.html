<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
display:flex;
background:#020617;
color:#fff;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
width:250px;
height:100vh;
background:#0f172a;
padding:20px;
position:fixed;
display:flex;
flex-direction:column;
transition:0.3s;
}

.logo img{
width:140px;
margin-bottom:20px;
}

/* MENU */
.menu{
flex:1;
}

.sidebar a{
display:block;
padding:12px;
margin:6px 0;
color:#aaa;
text-decoration:none;
border-radius:8px;
}

.sidebar a.active{
background:#1e293b;
color:#fff;
}

/* BACK BUTTON */
.back-btn{
margin-top:10px;
background:#ef4444;
color:#fff;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.back-btn:hover{
background:#dc2626;
}

/* MAIN */
.main{
margin-left:250px;
width:100%;
padding:15px;
}

/* TOPBAR */
.topbar{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
}

/* HAMBURGER */
.hamburger{
width:42px;
height:42px;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
background:#0f172a;
border-radius:12px;
border:1px solid #1e293b;
}

.hamburger span{
width:22px;
height:3px;
background:#fff;
margin:3px 0;
}

/* SETTINGS GRID */
.settings-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* CARD */
.card{
background:#0f172a;
padding:20px;
border-radius:12px;
}

/* INPUT */
.input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#020617;
color:#fff;
outline:none;
}

/* BUTTON */
.btn{
background:#22c55e;
padding:10px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.btn:hover{
background:#16a34a;
}

/* TOGGLE */
.toggle{
display:flex;
justify-content:space-between;
margin:10px 0;
}

/* MOBILE */
@media(max-width:768px){

.hamburger{display:flex;}

.sidebar{
left:-100%;
z-index:1000;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
}

.settings-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="logo">
<img src="logo.webp">
</div>

<div class="menu">
<a href="userdashboard.html">Dashboard</a>
<a href="userss.html">Users</a>
<a href="loginss.html">Logins</a>
<a href="devicess.html">Devices</a>
<a href="sessionss.html">Sessions</a>
<a href="settingss.html" class="active">Settings</a>

<!-- BACK BUTTON -->
<div class="back-btn" onclick="location.href='login.html'">
← Back
</div>

</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="hamburger" onclick="toggleSidebar()">
<span></span><span></span><span></span>
</div>
<h3>Settings</h3>
</div>

<div class="settings-grid">

<!-- PROFILE -->
<div class="card">
<h4>Profile</h4>
<input class="input" placeholder="Name">
<input class="input" placeholder="Email">
<button class="btn">Save</button>
</div>

<!-- PASSWORD -->
<div class="card">
<h4>Password</h4>
<input class="input" placeholder="Current Password">
<input class="input" placeholder="New Password">
<button class="btn">Update</button>
</div>

<!-- NOTIFICATIONS -->
<div class="card">
<h4>Notifications</h4>

<div class="toggle">
<span>Email Alerts</span>
<input type="checkbox" checked>
</div>

<div class="toggle">
<span>SMS Alerts</span>
<input type="checkbox">
</div>

</div>

<!-- THEME -->
<div class="card">
<h4>Theme</h4>

<div class="toggle">
<span>Dark Mode</span>
<input type="checkbox" checked>
</div>

<div class="toggle">
<span>Light Mode</span>
<input type="checkbox">
</div>

</div>

</div>

</div>

<script>

/* SIDEBAR FIX */
const sidebar = document.getElementById("sidebar");

function toggleSidebar(){
sidebar.classList.toggle("active");
}

/* CLICK OUTSIDE CLOSE */
document.addEventListener("click", function(e){
if(
sidebar.classList.contains("active") &&
!sidebar.contains(e.target) &&
!e.target.closest(".hamburger")
){
sidebar.classList.remove("active");
}
});

</script>

</body>
</html>
