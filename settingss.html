<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{display:flex;background:#020617;color:#fff;overflow-x:hidden;}

.sidebar{
width:250px;height:100vh;background:#0f172a;
padding:20px;position:fixed;
display:flex;flex-direction:column;justify-content:space-between;
}

.logo img{width:140px;margin-bottom:20px;}

.sidebar a{
display:block;padding:12px;margin:6px 0;
color:#aaa;text-decoration:none;border-radius:8px;
}

.sidebar a.active{
background:#1e293b;color:#fff;
}

.main{margin-left:250px;width:100%;padding:15px;}

.topbar{
display:flex;align-items:center;gap:15px;margin-bottom:15px;
}

.hamburger{
width:42px;height:42px;display:none;
flex-direction:column;justify-content:center;align-items:center;
cursor:pointer;background:#0f172a;border-radius:12px;
border:1px solid #1e293b;
}

.hamburger span{
width:22px;height:3px;background:#fff;margin:3px 0;
}

/* SETTINGS CARDS */
.settings-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
}

/* INPUT */
.input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#020617;
color:#fff;
}

/* BUTTON */
.btn{
background:#22c55e;
padding:10px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
margin-top:10px;
}

/* TOGGLE */
.toggle{
display:flex;
justify-content:space-between;
margin:10px 0;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{left:-100%;}
.sidebar.active{left:0;}
.main{margin-left:0;}
.settings-grid{grid-template-columns:1fr;}
.hamburger{display:flex;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div>
<div class="logo">
<img src="logo.webp">
</div>

<a href="userdashboard.html">Dashboard</a>
<a href="userss.html">Users</a>
<a href="loginss.html">Logins</a>
<a href="devicess.html">Devices</a>
<a href="sessionss.html">Sessions</a>
<a href="settingss.html" class="active">Settings</a>
</div>

<div class="back-btn" onclick="location.href='login.html'">
← Back
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="hamburger" onclick="toggleSidebar(this)">
<span></span><span></span><span></span>
</div>
<h3>Settings</h3>
</div>

<div class="settings-grid">

<!-- PROFILE -->
<div class="card">
<h4>Profile</h4>
<input class="input" placeholder="Name">
<input class="input" placeholder="Email">
<button class="btn">Save</button>
</div>

<!-- PASSWORD -->
<div class="card">
<h4>Password</h4>
<input class="input" placeholder="Current Password">
<input class="input" placeholder="New Password">
<button class="btn">Update</button>
</div>

<!-- NOTIFICATIONS -->
<div class="card">
<h4>Notifications</h4>

<div class="toggle">
<span>Email Alerts</span>
<input type="checkbox" checked>
</div>

<div class="toggle">
<span>SMS Alerts</span>
<input type="checkbox">
</div>

</div>

<!-- THEME -->
<div class="card">
<h4>Theme</h4>

<div class="toggle">
<span>Dark Mode</span>
<input type="checkbox" checked>
</div>

<div class="toggle">
<span>Light Mode</span>
<input type="checkbox">
</div>

</div>

</div>

</div>

<script>

function toggleSidebar(btn){
sidebar.classList.toggle("active");
btn.classList.toggle("active");
}

</script>

</body>
</html>
