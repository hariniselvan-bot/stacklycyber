<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{display:flex;background:#020617;color:#fff;overflow-x:hidden;}

/* SIDEBAR */
.sidebar{
width:250px;
height:100vh;
background:#0f172a;
padding:20px;
position:fixed;
display:flex;
flex-direction:column;
transition:.3s;
z-index:1000;
}
.logo img{width:140px;margin-bottom:20px;}

.sidebar a{
display:block;padding:12px;margin:6px 0;
color:#aaa;text-decoration:none;border-radius:8px;
}

/* 🔥 ACTIVE LINK */
.sidebar a.active{
background:#1e293b;
color:#fff;
}

/* REMOVE MOBILE STICKY HOVER */
@media (hover:none){
.sidebar a:hover{background:none;}
}

.sidebar a:hover{
background:#1e293b;color:#fff;
}

.back-btn{
background:#ef4444;padding:10px;text-align:center;
border-radius:8px;cursor:pointer;
}

/* MAIN */
.main{margin-left:250px;width:100%;padding:15px;}

/* TOPBAR */
.topbar{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
}

/* HAMBURGER */
.hamburger{
width:42px;height:42px;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
background:#0f172a;
border-radius:12px;
border:1px solid #1e293b;
}

.hamburger span{
width:22px;height:3px;
background:#fff;
margin:3px 0;
border-radius:5px;
transition:.4s;
}

.hamburger.active span:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}
.hamburger.active span:nth-child(2){opacity:0;}
.hamburger.active span:nth-child(3){
transform:rotate(-45deg) translate(5px,-5px);
}

/* OVERLAY */
.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:999;
}
.overlay.active{display:block;}

/* CARDS */
.top-cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:15px;
}

.info-card{
background:#0f172a;
padding:15px;
border-radius:12px;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
}

/* CARD */
.card{
background:#0f172a;
padding:15px;
border-radius:12px;
display:flex;
flex-direction:column;
height:320px;
}

/* CHART */
.chart-container{
width:100%;
height:100%;
min-height:200px;
}

canvas{max-width:100%!important;}

/* MAP */
#map{
width:100%;
height:100%;
min-height:250px;
border-radius:12px;
}

/* MOBILE */
@media(max-width:768px){

.hamburger{display:flex;}

.sidebar{left:-100%;}
.sidebar.active{left:0;}

.main{margin-left:0;}

.grid{grid-template-columns:1fr;}
.top-cards{grid-template-columns:1fr 1fr;}

.card{height:auto;}
.chart-container{height:250px;}

}
.back-btn{
background:#ef4444;
padding:10px;
text-align:center;
border-radius:8px;
cursor:pointer;
margin-top:12px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="logo">
  <img src="logo.webp">
</div>

<a href="userdashboard.html" class="active">Dashboard</a>
<a href="userss.html">Users</a>
<a href="loginss.html">Logins</a>
<a href="devicess.html">Devices</a>
<a href="sessionss.html">Sessions</a>
<a href="settingss.html">Settings</a>

<!-- ✅ MOVE HERE -->
<div class="back-btn" onclick="location.href='login.html'">
← Back
</div>

</div>

</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="hamburger" onclick="toggleSidebar(this)">
<span></span><span></span><span></span>
</div>
<h3>Devices</h3>
</div>

<div class="top-cards">
<div class="info-card"><h2>320</h2><p>Mobile</p></div>
<div class="info-card"><h2>210</h2><p>Desktop</p></div>
<div class="info-card"><h2>90</h2><p>Tablet</p></div>
<div class="info-card"><h2>98%</h2><p>Performance</p></div>
</div>

<div class="grid">

<div class="card">
<h4>Device Usage</h4>
<div class="chart-container">
<canvas id="lineChart"></canvas>
</div>
</div>

<div class="card">
<h4>Global Devices</h4>
<div id="map"></div>
</div>

<div class="card">
<h4>Device Distribution</h4>
<div class="chart-container">
<canvas id="riskChart"></canvas>
</div>
</div>

</div>

</div>

<script>

/* SIDEBAR */
function toggleSidebar(btn){
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
btn.classList.toggle("active");
}
function closeSidebar(){
sidebar.classList.remove("active");
overlay.classList.remove("active");
document.querySelector(".hamburger").classList.remove("active");
}

/* CHART */
new Chart(lineChart,{
type:'line',
data:{
labels:["Jan","Feb","Mar","Apr"],
datasets:[{data:[50,100,80,150],borderColor:"#22c55e"}]
},
options:{responsive:true,maintainAspectRatio:false}
});

new Chart(riskChart,{
type:'doughnut',
data:{
labels:["Mobile","Desktop","Tablet"],
datasets:[{data:[60,30,10]}]
}
});

/* MAP (NO + -) */
var map = L.map('map',{zoomControl:false}).setView([20,0],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

</script>

</body>
</html>
