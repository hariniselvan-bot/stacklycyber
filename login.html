<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Header</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:2000px;
  background:#0a0a0f;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  top:25px;
  display:flex;
  justify-content:center;
  z-index:1000;
}

/* NAVBAR */
.navbar{
  width:95%;
  max-width:1500px;
  padding:22px 40px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.1);
}

/* LOGO */
.logo img{
  height:50px;
}

/* NAV */
nav{
  display:flex;
  flex-direction:column;
  align-items:center;
}

nav ul{
  display:flex;
  gap:55px;
  list-style:none;
}

nav a{
  color:#ccc;
  text-decoration:none;
  font-size:18px;
}

/* RIGHT */
.right{
  display:flex;
  align-items:center;
  gap:15px;
}

/* BUTTONS */
.login-btn{
  border:1px solid rgba(255,255,255,0.3);
  padding:10px 18px;
  border-radius:25px;
  color:white;
  background:none;
}

.signup-btn{
  background:linear-gradient(45deg,#c94bff,#6a5cff);
  border:none;
  padding:10px 20px;
  border-radius:25px;
  color:white;
}

/* HAMBURGER */
#menu-btn{
  width:28px;
  height:20px;
  display:none;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

#menu-btn span{
  height:3px;
  background:white;
  border-radius:3px;
  transition:0.3s;
}

/* X ANIMATION (UNCHANGED) */
#menu-btn.active span:nth-child(1){
  transform:rotate(45deg) translate(5px,5px);
}
#menu-btn.active span:nth-child(2){
  opacity:0;
}
#menu-btn.active span:nth-child(3){
  transform:rotate(-45deg) translate(6px,-6px);
}

/* MOBILE BUTTONS (hidden desktop) */
.mobile-buttons{
  display:none;
}

/* MOBILE */
@media(max-width:900px){

nav{
  position:fixed;
  top:0;
  right:-100%;
  width:260px;
  height:100vh;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center; /* CENTER EVERYTHING */
  align-items:center;
  transition:0.4s;
}
nav ul li{
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}

nav.active ul li{
  opacity:1;
  transform:translateY(0);
}

nav.active ul li:nth-child(1){ transition-delay:0.1s; }
nav.active ul li:nth-child(2){ transition-delay:0.2s; }
nav.active ul li:nth-child(3){ transition-delay:0.3s; }
nav.active ul li:nth-child(4){ transition-delay:0.4s; }
nav.active ul li:nth-child(5){ transition-delay:0.5s; }

  nav.active{
    right:0;
  }.mobile-buttons{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:40px;
  align-items:center;
}

/* BUTTON ANIMATION */
.mobile-buttons button{
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}

nav.active .mobile-buttons button{
  opacity:1;
  transform:translateY(0);
}

nav.active .mobile-buttons button:nth-child(1){
  transition-delay:0.6s;
}
nav.active .mobile-buttons button:nth-child(2){
  transition-delay:0.7s;
}.mobile-buttons .login-btn:hover{
  box-shadow:0 0 10px rgba(255,255,255,0.2);
}

.mobile-buttons .signup-btn:hover{
  box-shadow:0 0 15px #c94bff;
}

  nav ul{
    flex-direction:column;
    gap:30px;
  }

  /* SHOW INSIDE MENU */
  .mobile-buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-top:30px;
  }

  #menu-btn{
    display:flex;
  }

  /* hide desktop buttons */
  .right .login-btn,
  .right .signup-btn{
    display:none;
  }
}
.login-btn,
.signup-btn {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 25px;
  text-decoration: none;
  font-size: 14px;
  cursor: pointer;
}

/* LOGIN */
.login-btn {
  border: 1px solid #c84cff;
  color: #fff;
}

/* SIGNUP */
.signup-btn {
  background: linear-gradient(135deg,#c84cff,#7b2cff);
  color: #fff;
  border: none;
}
</style>
</head>

<body>

<header>
  <div class="navbar">

    <div class="logo">
      <img src="logo.webp">
    </div>

    <nav id="nav">

      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="blog.html">Contact</a></li>
      </ul>

      <!-- MOBILE BUTTONS -->
<div class="mobile-buttons">
  <a href="login.html" class="login-btn">Login</a>
  <a href="signin.html" class="signup-btn">Sign Up</a>
</div>

</nav>

<div class="right">
  <a href="login.html" class="login-btn">Login</a>
  <a href="signin.html" class="signup-btn">Sign Up</a>
</div>

      <div id="menu-btn">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

  </div>
</header>

<script>

const menuBtn = document.getElementById("menu-btn");
const nav = document.getElementById("nav");

menuBtn.onclick = ()=>{
  menuBtn.classList.toggle("active"); // animation stays same
  nav.classList.toggle("active");
};

</script><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#17074b,#09001a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    text-align:center;
    color:#fff;
}

h1{
    margin-bottom:30px;
}

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input,
.input-box select{
    width:100%;
    padding:15px 50px;
    border:none;
    border-radius:30px;
    background:rgba(255,255,255,0.2);
    color:#000000;
    outline:none;
}

.input-box i{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    left:15px;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-bottom:20px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:#fff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

.signup{
    margin-top:20px;
}

.signup a{
    color:#fff;
}
.role{
background:rgba(36, 14, 123, 0.2);
}
</style>
</head>

<body>

<div class="login-box">

<h1>USER LOGIN</h1>

<form id="loginForm">

    <!-- ROLE -->
    <div class="input-box">
        <i class="fas fa-user-shield"></i>
        <select id="role" required>
            <option value="">Select Role</option>
            <option value="user">User</option>
            <option value="admin">Administrator</option>
        </select>
    </div>

    <!-- USERNAME -->
    <div class="input-box">
        <i class="fas fa-user"></i>
        <input type="text" placeholder="Username" required>
    </div>

    <!-- PASSWORD -->
    <div class="input-box">
        <i class="fas fa-lock"></i>
        <input type="password" placeholder="Password" required>
    </div>

    <!-- OPTIONS -->
    <div class="options">
        <label><input type="checkbox"> Remember Me</label>
        <a href="404.html">Forgot Password?</a>
    </div>

    <button type="submit">LOGIN</button>

</form>

<div class="signup">
    New user? <a href="signin.html">Create Account</a>
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    if(!this.checkValidity()){
        return; // show HTML error
    }

    e.preventDefault();

    const role = document.getElementById("role").value;

    if(role === "user"){
        window.location.href = "userdashboard.html";
    }
    else if(role === "admin"){
        window.location.href = "admindashboard.html";
    }

});

</script>

</body>
</html>
