<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Devices Analytics</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{display:flex;background:#020617;color:#fff;overflow-x:hidden;}

.sidebar{
width:250px;height:100vh;background:#0f172a;
padding:20px;position:fixed;
display:flex;flex-direction:column;justify-content:space-between;
}

.logo img{width:140px;margin-bottom:20px;}

.sidebar a{
display:block;padding:12px;margin:6px 0;
color:#aaa;text-decoration:none;border-radius:8px;
}

.sidebar a.active{
background:#1e293b;color:#fff;
}

.main{margin-left:250px;width:100%;padding:15px;}

.topbar{
display:flex;align-items:center;gap:15px;margin-bottom:15px;
}

.hamburger{
width:42px;height:42px;display:none;
flex-direction:column;justify-content:center;align-items:center;
cursor:pointer;background:#0f172a;border-radius:12px;
border:1px solid #1e293b;
}

.hamburger span{
width:22px;height:3px;background:#fff;margin:3px 0;
}

/* CARDS */
.top-cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;margin-bottom:15px;
}

.info-card{
background:#0f172a;padding:15px;border-radius:12px;text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
}

.card{
background:#0f172a;padding:15px;border-radius:12px;height:320px;
}

.chart-container{width:100%;height:100%;}
#map{width:100%;height:100%;border-radius:12px;}

/* MOBILE */
@media(max-width:768px){
.hamburger{display:flex;}
.sidebar{left:-100%;}
.sidebar.active{left:0;}
.main{margin-left:0;}
.grid{grid-template-columns:1fr;}
.top-cards{grid-template-columns:1fr 1fr;}
.card{height:auto;}
.chart-container{height:250px;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div>
<div class="logo">
<img src="logo.webp">
</div>

<a href="userdashboard.html">Dashboard</a>
<a href="userss.html">Users</a>
<a href="loginss.html">Logins</a>
<a href="devicess.html" class="active">Devices</a>
<a href="sessionss.html">Sessions</a>
<a href="settingss.html">Settings</a>
</div>

<div class="back-btn" onclick="location.href='login.html'">
← Back
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="hamburger" onclick="toggleSidebar(this)">
<span></span><span></span><span></span>
</div>
<h3>Devices</h3>
</div>

<!-- DEVICE CARDS -->
<div class="top-cards">
<div class="info-card"><h2>320</h2><p>Mobile</p></div>
<div class="info-card"><h2>210</h2><p>Desktop</p></div>
<div class="info-card"><h2>90</h2><p>Tablet</p></div>
<div class="info-card"><h2>76%</h2><p>Mobile Usage</p></div>
</div>

<div class="grid">

<!-- DEVICE TREND -->
<div class="card">
<h4>Device Usage Trend</h4>
<div class="chart-container">
<canvas id="deviceChart"></canvas>
</div>
</div>

<!-- MAP -->
<div class="card">
<h4>Device Locations</h4>
<div id="map"></div>
</div>

<!-- DISTRIBUTION -->
<div class="card">
<h4>Device Distribution</h4>
<div class="chart-container">
<canvas id="distChart"></canvas>
</div>
</div>

</div>

</div>

<script>

/* SIDEBAR */
function toggleSidebar(btn){
sidebar.classList.toggle("active");
btn.classList.toggle("active");
}

/* DEVICE TREND */
new Chart(deviceChart,{
type:'bar',
data:{
labels:["Jan","Feb","Mar","Apr","May","Jun"],
datasets:[
{
label:"Mobile",
data:[120,200,180,250,300,280],
backgroundColor:"#22c55e"
},
{
label:"Desktop",
data:[80,140,120,180,220,200],
backgroundColor:"#3b82f6"
}
]
},
options:{responsive:true,maintainAspectRatio:false}
});

/* DISTRIBUTION */
new Chart(distChart,{
type:'doughnut',
data:{
labels:["Mobile","Desktop","Tablet"],
datasets:[{
data:[60,30,10],
backgroundColor:["#22c55e","#3b82f6","#f59e0b"]
}]
}
});

/* MAP */
var map = L.map('map',{zoomControl:false}).setView([20,0],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

L.circleMarker([13.08,80.27],{radius:8,color:"#22c55e"}).addTo(map).bindPopup("Mobile Users");
L.circleMarker([28.6,77.2],{radius:8,color:"#3b82f6"}).addTo(map).bindPopup("Desktop Users");

</script>

</body>
</html>
